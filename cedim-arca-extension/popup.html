<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>CEDIM ARCA</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 320px;
        padding: 14px;
        background: #f7f7f7;
      }

      h1 {
        font-size: 18px;
        margin: 0 0 12px;
      }

      label {
        display: block;
        font-size: 12px;
        margin-top: 10px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        margin-top: 4px;
      }

      button {
        width: 100%;
        padding: 10px;
        margin-top: 12px;
        border: 0;
        cursor: pointer;
        background: #111;
        color: white;
        border-radius: 6px;
      }

      .secondary {
        background: #555;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #333;
      }
    </style>
  </head>

  <body>
    <h1>CEDIM ARCA</h1>

    <label>URL Supabase</label>
    <input id="supabaseUrl" placeholder="https://xxxxx.supabase.co" />

    <label>Anon Key</label>
    <input id="supabaseAnonKey" placeholder="eyJ..." />

    <button id="saveConfig">Guardar configuración</button>
    <button id="loadDraft" class="secondary">Cargar último borrador</button>
    <button id="sendToPage">Enviar datos a ARCA</button>

    <div id="status" class="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
